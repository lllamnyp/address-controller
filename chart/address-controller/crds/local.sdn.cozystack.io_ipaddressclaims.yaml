    controller-gen.kubebuilder.io/version: v0.17.1
  name: ipaddressclaims.local.sdn.cozystack.io
spec:
  group: local.sdn.cozystack.io
  names:
    kind: IPAddressClaim
    listKind: IPAddressClaimList
    plural: ipaddressclaims
    singular: ipaddressclaim
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.className
      name: Class
      type: string
    - jsonPath: .status.addresses[*].address
      name: Addresses
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          IPAddressClaim is a namespaced request for an address — the whole
          tenant-facing API, the PersistentVolumeClaim of the address model.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: IPAddressClaimSpec defines the desired state of IPAddressClaim.
            properties:
              addressName:
                description: |-
                  addressName pins the claim to a specific Available IPAddress instead
                  of letting the controller match or the driver provision one — the
                  analogue of PersistentVolumeClaim.spec.volumeName. Only meaningful
                  for single-family claims.
                type: string
              className:
                description: |-
                  className names the IPAddressClass to draw from. Empty means the
                  default class (the one annotated
                  ipaddressclass.local.sdn.cozystack.io/is-default-class: "true").
                type: string
              family:
                default: IPv4
                description: family selects the IP families requested.
                enum:
                - IPv4
                - IPv6
                - Dual
                type: string
            type: object
          status:
            description: IPAddressClaimStatus defines the observed state of IPAddressClaim.
            properties:
              addresses:
                description: |-
                  addresses lists the bound addresses. A list deliberately: a Dual
                  claim binds a v4 and a v6 IPAddress and must report both. For a
                  single-family claim the list has one entry.
                items:
                  description: BoundAddress reports one IPAddress bound to the claim.
                  properties:
                    address:
                      description: address is the IP itself — what the tenant reads
                        and puts in DNS.
                      type: string
                    name:
                      description: name of the bound IPAddress object.
                      type: string
                  required:
                  - address
                  - name
                  type: object
                type: array
              className:
                description: |-
                  className is the class the claim resolved to. For claims created
                  without a className it records which default class was picked; the
                  resolution is sticky.
                type: string
              conditions:
                description: |-
                  conditions represent the latest available observations of the
                  claim's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: phase is the current lifecycle phase of the claim.
                enum:
                - Pending
                - Bound
                - Lost
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
