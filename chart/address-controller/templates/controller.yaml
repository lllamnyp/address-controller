{{- /* The ClusterRole lives in templates/role.yaml, GENERATED by controller-gen
       from the +kubebuilder:rbac markers (make manifests). Everything
       deployment-shaped is hand-written here. */ -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: address-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "address-controller.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: address-controller
  labels:
    {{- include "address-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: address-controller
subjects:
  - kind: ServiceAccount
    name: address-controller
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: address-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: address-controller
    {{- include "address-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app: address-controller
  template:
    metadata:
      labels:
        app: address-controller
    spec:
      serviceAccountName: address-controller
      {{- with .Values.controller.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- include "address-controller.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            - --leader-elect={{ .Values.controller.leaderElect }}
            - --metrics-bind-address={{ .Values.controller.metricsBindAddress }}
            - --health-probe-bind-address=:8081
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /healthz, port: 8081 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 8081 }
