---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  name: ipaddresses.local.sdn.cozystack.io
spec:
  group: local.sdn.cozystack.io
  names:
    kind: IPAddress
    listKind: IPAddressList
    plural: ipaddresses
    singular: ipaddress
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.address
      name: Address
      type: string
    - jsonPath: .spec.className
      name: Class
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.claimRef.namespace
      name: ClaimNamespace
      type: string
    - jsonPath: .spec.claimRef.name
      name: Claim
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          IPAddress is a concrete address the cluster owns — the inventory object,
          the PersistentVolume of the address model. Created by a per-class driver
          (or an admin, for static pre-provisioning), never by tenants.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: IPAddressSpec defines the desired state of IPAddress.
            properties:
              address:
                description: |-
                  address is the IP address itself, in canonical textual form
                  (e.g. "203.0.113.7" or "2001:db8::7").
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: address is immutable
                  rule: self == oldSelf
              claimRef:
                description: |-
                  claimRef binds this address to a claim. Set either by the driver at
                  provisioning time (pre-bound) or by the core controller when it
                  matches an Available address to a claim. An address with no claimRef
                  is Available. After a Retain reclaim the field survives the claim
                  (phase Released) until an admin clears it.
                properties:
                  name:
                    description: name of the claim.
                    minLength: 1
                    type: string
                  namespace:
                    description: namespace of the claim.
                    minLength: 1
                    type: string
                  uid:
                    description: |-
                      uid of the claim. A driver pre-binding an address may leave it empty;
                      the core controller completes it when it accepts the binding.
                    type: string
                required:
                - name
                - namespace
                type: object
              className:
                description: className names the IPAddressClass this address belongs
                  to.
                minLength: 1
                type: string
              reclaimPolicy:
                default: Retain
                description: |-
                  reclaimPolicy governs what happens to this object when its claim is
                  deleted; copied from the class at provisioning time.
                enum:
                - Retain
                - Delete
                type: string
              source:
                description: source records where the address came from.
                properties:
                  fromClass:
                    description: fromClass marks the address as allocated from the
                      class's range.
                    type: object
                  providerRef:
                    description: |-
                      providerRef marks the address as adopted from a provider-side
                      reservation.
                    properties:
                      id:
                        description: |-
                          id is the provider-side stable handle of the reservation, for example
                          an AWS allocation id ("eipalloc-0a1b...").
                        minLength: 1
                        type: string
                    required:
                    - id
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of fromClass or providerRef must be set
                  rule: '(has(self.fromClass) ? 1 : 0) + (has(self.providerRef) ?
                    1 : 0) == 1'
            required:
            - address
            - className
            - source
            type: object
          status:
            description: IPAddressStatus defines the observed state of IPAddress.
            properties:
              associatedTo:
                description: |-
                  associatedTo names the workload the address is currently announced
                  for. Nil means reserved but inert. Maintained by the per-class
                  driver, never by the core controller.
                properties:
                  kind:
                    description: kind of the associated object, e.g. "Service".
                    minLength: 1
                    type: string
                  name:
                    description: name of the associated object.
                    minLength: 1
                    type: string
                  namespace:
                    description: namespace of the associated object.
                    minLength: 1
                    type: string
                required:
                - kind
                - name
                - namespace
                type: object
              conditions:
                description: |-
                  conditions represent the latest available observations of the
                  address's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: phase is the current lifecycle phase of the address.
                enum:
                - Pending
                - Available
                - Bound
                - Released
                - Conflict
                - Lost
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
