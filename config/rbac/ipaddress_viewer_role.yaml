# This rule is not used by the project address-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to local.sdn.cozystack.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: address-controller
    app.kubernetes.io/managed-by: kustomize
  name: ipaddress-viewer-role
rules:
- apiGroups:
  - local.sdn.cozystack.io
  resources:
  - ipaddresses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - local.sdn.cozystack.io
  resources:
  - ipaddresses/status
  verbs:
  - get
