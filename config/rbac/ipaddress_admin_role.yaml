# This rule is not used by the project address-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over local.sdn.cozystack.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: address-controller
    app.kubernetes.io/managed-by: kustomize
  name: ipaddress-admin-role
rules:
- apiGroups:
  - local.sdn.cozystack.io
  resources:
  - ipaddresses
  verbs:
  - '*'
- apiGroups:
  - local.sdn.cozystack.io
  resources:
  - ipaddresses/status
  verbs:
  - get
